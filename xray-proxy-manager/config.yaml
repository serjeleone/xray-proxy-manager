name: Xray Proxy Manager
version: "0.5.0"
slug: xray-proxy-manager
image: "ghcr.io/serjeleone/xray-proxy-manager"
description: "Управление Xray через два независимых SOCKS5-слота с предварительной проверкой и безопасным переключением outbound"
url: "https://github.com/serjeleone/xray-proxy-manager"
arch:
  - aarch64
  - amd64
startup: services
boot: auto
init: false
host_network: false
ingress: true
ingress_port: 8099
panel_icon: mdi:server-network
panel_title: Xray Proxy Manager
panel_admin: true
hassio_api: true
hassio_role: default
watchdog: "http://[HOST]:[PORT:8099]/api/health"
backup: hot
map:
  - addon_config:rw
ports:
  10808/tcp: 10808
  10808/udp: 10808
  10809/tcp: 10809
  10809/udp: 10809
ports_description:
  10808/tcp: "SOCKS5 · слот xray-a"
  10808/udp: "SOCKS5 UDP · слот xray-a"
  10809/tcp: "SOCKS5 · слот xray-b"
  10809/udp: "SOCKS5 UDP · слот xray-b"
options:
  subscription_url: ""
  config_index: 0
  update_interval_hours: 1
  listen_lan: true
  socks_tcp_a: 10808
  socks_tcp_b: 10809
  socks_udp_a: true
  socks_udp_b: true
  override_inbounds: true
  proxy_username: ""
  proxy_password: ""
  disable_observatory: true
  log_level: "warning"
  user_agent: "Xray Proxy Manager Home Assistant App"
  validate_routing_tags: true
  auto_fix_routing_tags: true
  restart_on_runtime_error: true
  auto_add_proxy_direct: true
  auto_checker_enabled: true
  auto_switch_best_enabled: true
  auto_switch_excluded_countries: "RU"
  auto_switch_min_ping_delta_ms: 100
  auto_check_interval_seconds: 600
  auto_check_failures: 3
  auto_check_timeout_seconds: 12
  latency_test_timeout_seconds: 12
  latency_test_url: "https://www.gstatic.com/generate_204"
  health_check_url: "https://www.gstatic.com/generate_204"
  selector_control_enabled: false
  selector_api_url: "http://192.0.2.1:9090"
  selector_api_secret: ""
  selector_tag: "xray-active"
  selector_status_interval_seconds: 10
  drain_quiet_seconds: 30
  drain_poll_interval_seconds: 2
  ui_sort: "ping-asc"
  ui_protocol_filter: "all"
  ui_max_ping_ms: 1000
  ui_hide_unavailable: false
schema:
  subscription_url: str
  config_index: int(0,)
  update_interval_hours: int(0,720)
  listen_lan: bool
  socks_tcp_a: port
  socks_tcp_b: port
  socks_udp_a: bool
  socks_udp_b: bool
  override_inbounds: bool
  proxy_username: str?
  proxy_password: password?
  disable_observatory: bool?
  log_level: list(debug|info|warning|error|none)
  user_agent: str
  validate_routing_tags: bool?
  auto_fix_routing_tags: bool?
  restart_on_runtime_error: bool?
  auto_add_proxy_direct: bool?
  auto_checker_enabled: bool
  auto_switch_best_enabled: bool
  auto_switch_excluded_countries: str
  auto_switch_min_ping_delta_ms: int(0,10000)
  auto_check_interval_seconds: int(10,86400)
  auto_check_failures: int(1,100)
  auto_check_timeout_seconds: int(3,)
  latency_test_timeout_seconds: int(3,)
  latency_test_url: str
  health_check_url: str
  selector_control_enabled: bool
  selector_api_url: str
  selector_api_secret: password?
  selector_tag: str
  selector_status_interval_seconds: int(5,)
  drain_quiet_seconds: int(5,)
  drain_poll_interval_seconds: int(1,)
  ui_sort: list(name-asc|name-desc|ping-asc|ping-desc|protocol-asc|protocol-desc)
  ui_protocol_filter: str
  ui_max_ping_ms: int(0,10000)
  ui_hide_unavailable: bool

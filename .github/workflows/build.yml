name: Release

run-name: ${{ github.event.release.name || github.event.release.tag_name || format('Ручной запуск — {0}', github.ref_name) }}

on:
  release:
    types:
      - published

  workflow_dispatch:
    inputs:
      publish:
        description: После проверок собрать и опубликовать приложение
        required: true
        type: boolean
        default: false

permissions: {}

env:
  ARCHITECTURES: '["amd64", "aarch64"]'
  IMAGE_NAME: xray-proxy-manager

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Validate release
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      version: ${{ steps.version.outputs.version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      commit_subject: ${{ steps.metadata.outputs.commit_subject }}

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Read commit metadata
        id: metadata
        shell: bash
        run: |
          commit_subject="$(git log -1 --pretty=%s)"

          if [[ -z "${commit_subject}" ]]; then
            commit_subject="${GITHUB_REF_NAME}"
          fi

          echo "commit_subject=${commit_subject}" >> "$GITHUB_OUTPUT"
          echo "Commit: ${commit_subject}"

      - name: Read and validate app version
        id: version
        shell: bash
        env:
          PUBLISHED_TAG: ${{ github.event.release.tag_name }}
        run: |
          version="$(
            awk -F': *' \
              '$1 == "version" {
                gsub(/"/, "", $2)
                print $2
                exit
              }' \
              xray-proxy-manager/config.yaml
          )"

          if [[ -z "${version}" ]]; then
            echo "Unable to read version from xray-proxy-manager/config.yaml" >&2
            exit 1
          fi

          release_tag="v${version}"

          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            if [[ -z "${PUBLISHED_TAG}" ]]; then
              echo "Unable to read the published release tag" >&2
              exit 1
            fi

            if [[ "${PUBLISHED_TAG}" != "${release_tag}" ]]; then
              echo \
                "GitHub release tag ${PUBLISHED_TAG} does not match app release tag ${release_tag}" \
                >&2
              exit 1
            fi
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ "${GITHUB_REF_NAME}" != "${release_tag}" ]]; then
              echo \
                "Selected Git tag ${GITHUB_REF_NAME} does not match app release tag ${release_tag}" \
                >&2
              exit 1
            fi
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"

          echo "Application version: ${version}"
          echo "Expected release tag: ${release_tag}"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Install validation dependencies
        run: |
          python -m pip install \
            --disable-pip-version-check \
            PyYAML

      - name: Validate Python
        run: |
          python -m py_compile \
            xray-proxy-manager/manager.py

      - name: Validate JavaScript
        run: |
          node --check \
            xray-proxy-manager/web/app.js

      - name: Test slot management logic
        run: |
          python -m unittest discover \
            -s tests \
            -v

      - name: Validate shell scripts
        run: |
          sh -n xray-proxy-manager/run.sh

      - name: Validate YAML and JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          import yaml

          for path in Path(".").rglob("*.json"):
              json.loads(path.read_text())

          for pattern in ("*.yaml", "*.yml"):
              for path in Path(".").rglob(pattern):
                  yaml.safe_load(path.read_text())
          PY

      - name: Validate release documentation
        run: |
          python - <<'PY'
          from pathlib import Path

          import yaml

          config = yaml.safe_load(
              Path("xray-proxy-manager/config.yaml").read_text()
          )

          version = str(config["version"])
          release_tag = f"v{version}"

          changelog = Path(
              "xray-proxy-manager/CHANGELOG.md"
          ).read_text()

          docs = Path(
              "xray-proxy-manager/DOCS.md"
          ).read_text()

          if f"## {release_tag}" not in changelog:
              raise SystemExit(
                  f"Missing changelog section {release_tag}"
              )

          if release_tag not in docs:
              raise SystemExit(
                  f"Missing release tag {release_tag} in DOCS.md"
              )
          PY

      - name: Validate documented settings
        run: |
          python - <<'PY'
          from pathlib import Path

          import yaml

          config = yaml.safe_load(
              Path("xray-proxy-manager/config.yaml").read_text()
          )

          keys = (
              set(config.get("options", {}))
              | set(config.get("schema", {}))
          )

          docs = Path(
              "xray-proxy-manager/DOCS.md"
          ).read_text()

          missing = sorted(
              key
              for key in keys
              if f"`{key}`" not in docs
          )

          if missing:
              raise SystemExit(
                  "Undocumented settings: " + ", ".join(missing)
              )
          PY

      - name: Validate configuration translations
        run: |
          python - <<'PY'
          from pathlib import Path

          import yaml

          config = yaml.safe_load(
              Path("xray-proxy-manager/config.yaml").read_text()
          )

          keys = set(config.get("schema", {}))
          port_keys = set(config.get("ports", {}))

          for language in ("ru", "en"):
              path = Path(
                  f"xray-proxy-manager/translations/{language}.yaml"
              )

              data = yaml.safe_load(path.read_text()) or {}
              translated = data.get("configuration", {})

              missing = sorted(
                  keys - set(translated)
              )

              incomplete = sorted(
                  key
                  for key in keys
                  if not translated.get(key, {}).get("name")
                  or not translated.get(key, {}).get("description")
              )

              network = data.get("network", {})

              missing_network = sorted(
                  port_keys - set(network)
              )

              invalid_network = sorted(
                  key
                  for key in port_keys
                  if not isinstance(network.get(key), str)
                  or not network.get(key).strip()
              )

              if (
                  missing
                  or incomplete
                  or missing_network
                  or invalid_network
              ):
                  raise SystemExit(
                      f"{language}: "
                      f"missing={missing}; "
                      f"incomplete={incomplete}; "
                      f"missing_network={missing_network}; "
                      f"invalid_network={invalid_network}"
                  )
          PY

      - name: Validate Markdown containers
        run: |
          python - <<'PY'
          from pathlib import Path

          files = (
              "README.md",
              "xray-proxy-manager/README.md",
              "xray-proxy-manager/DOCS.md",
          )

          for name in files:
              text = Path(name).read_text()

              if text.count("<details>") != text.count("</details>"):
                  raise SystemExit(
                      f"{name}: unbalanced details blocks"
                  )

              if text.count("```") % 2:
                  raise SystemExit(
                      f"{name}: unbalanced code fences"
                  )
          PY

      - name: Validate Home Assistant container metadata
        run: |
          grep -Fq \
            'FROM ghcr.io/home-assistant/base:' \
            xray-proxy-manager/Dockerfile

          grep -Fq \
            'io.hass.version=' \
            xray-proxy-manager/Dockerfile

          grep -Fq \
            'io.hass.type="app"' \
            xray-proxy-manager/Dockerfile

          grep -Fq \
            'io.hass.arch=' \
            xray-proxy-manager/Dockerfile

          grep -Fq \
            'org.opencontainers.image.authors="serjeleone"' \
            xray-proxy-manager/Dockerfile

          grep -Fq \
            'image: "ghcr.io/serjeleone/xray-proxy-manager"' \
            xray-proxy-manager/config.yaml

          grep -Fq \
            -- '- app_config:rw' \
            xray-proxy-manager/config.yaml

          ! grep -Fq \
            'addon_config' \
            xray-proxy-manager/config.yaml

          ! grep -Fq \
            'ports_description:' \
            xray-proxy-manager/config.yaml

          grep -Fq \
            'release_tag="v${version}"' \
            .github/workflows/build.yml

          grep -Fq \
            'published' \
            .github/workflows/build.yml

          test -f .github/workflows/build.yml
          test ! -f .github/workflows/validate.yml

      - name: Validate flat app data paths
        run: |
          grep -Fq \
            "WORKDIR = Path('/config')" \
            xray-proxy-manager/manager.py

          ! grep -RIn \
            --exclude='manager.py' \
            --exclude='CHANGELOG.md' \
            '/config/xray-proxy-manager/' \
            xray-proxy-manager \
            README.md

      - name: Check for committed secrets and private data
        run: |
          ! grep -RInE \
            --exclude='*.png' \
            --exclude='build.yml' \
            --exclude-dir='.git' \
            'BEGIN (OPENSSH |RSA |EC |DSA )?PRIVATE KEY|192\.168\.0\.(250|254)|109\.252\.|Serjio' \
            .

      - name: Prepare architecture matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@4de35182ce1e329181bffcbcc84d33db5e2c7e10 # 2026.06.0
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ env.IMAGE_NAME }}

  build:
    name: Build ${{ matrix.arch }} — ${{ needs.prepare.outputs.commit_subject }}

    needs:
      - prepare

    if: ${{ github.event_name == 'release' || inputs.publish == true }}

    runs-on: ${{ matrix.os }}

    permissions:
      contents: read
      id-token: write
      packages: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build and publish image
        uses: home-assistant/builder/actions/build-image@4de35182ce1e329181bffcbcc84d33db5e2c7e10 # 2026.06.0
        with:
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: ./xray-proxy-manager
          image: ${{ matrix.image }}

          image-tags: |
            ${{ needs.prepare.outputs.release_tag }}
            ${{ needs.prepare.outputs.version }}
            latest

          labels: |
            io.hass.name=Xray Proxy Manager
            io.hass.description=Управление Xray через два независимых SOCKS5-слота
            io.hass.type=app
            io.hass.url=https://github.com/serjeleone/xray-proxy-manager
            org.opencontainers.image.title=Xray Proxy Manager
            org.opencontainers.image.description=Home Assistant app for Xray outbound management with two independent SOCKS5 slots
            org.opencontainers.image.authors=serjeleone
            org.opencontainers.image.version=${{ needs.prepare.outputs.release_tag }}
            org.opencontainers.image.documentation=https://github.com/serjeleone/xray-proxy-manager/blob/main/xray-proxy-manager/DOCS.md

          push: "true"
          version: ${{ needs.prepare.outputs.version }}

  manifest:
    name: Publish manifest — ${{ needs.prepare.outputs.commit_subject }}

    needs:
      - prepare
      - build

    if: ${{ github.event_name == 'release' || inputs.publish == true }}

    runs-on: ubuntu-latest

    permissions:
      id-token: write
      packages: write

    steps:
      - name: Publish multi-architecture image
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@4de35182ce1e329181bffcbcc84d33db5e2c7e10 # 2026.06.0
        with:
          architectures: ${{ env.ARCHITECTURES }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ env.IMAGE_NAME }}

          image-tags: |
            ${{ needs.prepare.outputs.release_tag }}
            ${{ needs.prepare.outputs.version }}
            latest
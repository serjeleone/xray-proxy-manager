name: Validate

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check PyYAML

      - name: Validate Python
        run: python -m py_compile xray-proxy-manager/manager.py

      - name: Validate JavaScript
        run: node --check xray-proxy-manager/web/app.js

      - name: Validate shell scripts
        run: |
          sh -n xray-proxy-manager/run.sh

      - name: Validate YAML and JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import yaml

          for path in Path('.').rglob('*.json'):
              json.loads(path.read_text())
          for pattern in ('*.yaml', '*.yml'):
              for path in Path('.').rglob(pattern):
                  yaml.safe_load(path.read_text())
          PY

      - name: Validate documented settings
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          config = yaml.safe_load(Path('xray-proxy-manager/config.yaml').read_text())
          keys = set(config.get('options', {})) | set(config.get('schema', {}))
          docs = Path('xray-proxy-manager/DOCS.md').read_text()
          missing = sorted(key for key in keys if f'`{key}`' not in docs)
          if missing:
              raise SystemExit('Undocumented settings: ' + ', '.join(missing))
          PY

      - name: Validate Markdown containers
        run: |
          python - <<'PY'
          from pathlib import Path

          for name in ('README.md', 'xray-proxy-manager/README.md', 'xray-proxy-manager/DOCS.md'):
              text = Path(name).read_text()
              if text.count('<details>') != text.count('</details>'):
                  raise SystemExit(f'{name}: unbalanced details blocks')
              if text.count('```') % 2:
                  raise SystemExit(f'{name}: unbalanced code fences')
          PY

      - name: Validate Home Assistant container metadata
        run: |
          grep -Fq 'FROM ghcr.io/home-assistant/base:' xray-proxy-manager/Dockerfile
          grep -Fq 'io.hass.version=' xray-proxy-manager/Dockerfile
          grep -Fq 'io.hass.type="app"' xray-proxy-manager/Dockerfile
          grep -Fq 'io.hass.arch=' xray-proxy-manager/Dockerfile
          grep -Fq 'org.opencontainers.image.authors="serjeleone"' xray-proxy-manager/Dockerfile
          grep -Fq 'image: "ghcr.io/serjeleone/xray-proxy-manager"' xray-proxy-manager/config.yaml
          test -f .github/workflows/build.yml

      - name: Check for committed secrets and private data
        run: |
          ! grep -RInE --exclude='*.png' --exclude='validate.yml' --exclude-dir='.git' \
            'BEGIN (OPENSSH |RSA |EC |DSA )?PRIVATE KEY|192\.168\.0\.(250|254)|109\.252\.|Serjio' .
